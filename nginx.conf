# ============================================
# Nginx 反向代理配置 - 电费单识别系统
# ============================================
# 路径: /etc/nginx/sites-available/electricity-bill
# 启用: ln -s /etc/nginx/sites-available/electricity-bill /etc/nginx/sites-enabled/
#
# 前端静态文件需先构建: cd frontend && npm run build
# 产出目录: frontend/dist/

server {
    listen 80;
    server_name your-domain.com;          # ← 改为你的域名

    # 上传文件大小限制 (PDF/图片)
    client_max_body_size 50M;

    # --- 前端静态文件 ---
    root /opt/electricity-bill/frontend/dist;
    index index.html;

    # Vue SPA 路由回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- 后端 API 反向代理 ---
    location /api/ {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 长超时 (OCR + LLM 可能耗时数分钟)
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
    }

    # --- HTTPS 重定向 (配置 SSL 后取消注释) ---
    # listen 443 ssl;
    # ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    #
    # server {
    #     listen 80;
    #     server_name your-domain.com;
    #     return 301 https://$host$request_uri;
    # }
}
